#    container_name: pocketllm-frontend
#    image: node:22-alpine
#    working_dir: /app
#    volumes:
#      - ./frontend:/app
#      - /app/node_modules
#    ports:
#      - "5173:5173"
#    env_file:
#      - ./frontend/.env.docker
#    command: [ "npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173" ]
#    depends_on:
